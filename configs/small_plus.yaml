# Slightly stronger preset for users who want better generation quality
# without jumping to a huge setup.

model:
  d_model: 512
  num_layers: 8
  num_heads: 8
  d_ff: 2048
  max_seq_len: 512
  dropout: 0.1
  attention_type: "mha"
  num_kv_heads: null
  pos_encoding_type: "sinusoidal"
  norm_type: "layernorm"
  norm_position: "pre"
  ffn_type: "standard"
  activation: "gelu"

data:
  data_path: "output/packed/tinystories_small_plus"
  tokenizer_path: "assets/tokenizers/english_bytebpe_8k.json"
  split_ratio: [0.995, 0.005, 0.0]
  split_seed: 42
  add_special_tokens: false

training:
  batch_size: 8
  learning_rate: 3.0e-4
  weight_decay: 0.01
  num_epochs: 1
  seed: 42
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1
  scheduler_type: "warmup_cosine"
  warmup_steps: 1000
  use_amp: false
  use_wandb: false
  log_interval: 20
  checkpoint_dir: "checkpoints/small_plus"
  num_workers: 0
