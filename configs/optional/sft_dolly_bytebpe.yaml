# Optional SFT reference config. Not part of the required baseline path.
# Recommended "real dataset" SFT option:
# - existing dataset: Dolly 15k
# - sampled down to 128 short examples
# - filtered to fit the provided byte-level BPE tokenizer
#
# This file is included only as a reference for the optional SFT discussion.
# The starter repo does not currently ship a full end-to-end SFT trainer.
# Treat it as a readable example config, not as a required path.

model:
  d_model: 256
  num_layers: 4
  num_heads: 4
  d_ff: 1024
  max_seq_len: 256
  dropout: 0.1
  attention_type: "mha"
  num_kv_heads: null
  pos_encoding_type: "sinusoidal"
  norm_type: "layernorm"
  norm_position: "pre"
  ffn_type: "standard"
  activation: "gelu"

data:
  data_path: "output/dolly_15k_small/dolly_15k_128.jsonl"
  tokenizer_path: "assets/tokenizers/english_bytebpe_8k.json"
  split_ratio: [0.9, 0.1, 0.0]
  split_seed: 42

training:
  batch_size: 8
  learning_rate: 3.0e-4
  weight_decay: 0.0
  num_epochs: 15
  seed: 42
  label_ignore_index: -100
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1
  scheduler_type: "warmup_cosine"
  warmup_steps: 5
  use_amp: false
  use_wandb: false
  log_interval: 10
  checkpoint_dir: "checkpoints/dolly_bytebpe_sft"
  num_workers: 0
