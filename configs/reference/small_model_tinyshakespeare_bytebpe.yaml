# Reference Tiny Shakespeare byte-level BPE config. Optional.
# Tiny Shakespeare byte-level BPE quality-oriented preset
# This preset is larger than the tiny quickstart so students can compare how
# model capacity changes loss and sample quality under the same tokenizer/data.

model:
  d_model: 512
  num_layers: 8
  num_heads: 8
  d_ff: 2048
  max_seq_len: 256
  dropout: 0.1

  attention_type: "mha"
  num_kv_heads: null
  pos_encoding_type: "sinusoidal"
  norm_type: "layernorm"
  norm_position: "pre"
  ffn_type: "standard"
  activation: "gelu"

data:
  data_path: "output/tinyshakespeare/tinyshakespeare.jsonl"
  tokenizer_path: "output/tinyshakespeare_bytebpe/tokenizer.json"
  split_ratio: [0.9, 0.05, 0.05]

training:
  batch_size: 16
  learning_rate: 3.0e-4
  weight_decay: 0.01
  num_epochs: 5

  max_grad_norm: 1.0
  gradient_accumulation_steps: 1

  scheduler_type: "warmup_cosine"
  warmup_steps: 50

  use_amp: false

  use_wandb: false
  log_interval: 10
  checkpoint_dir: "checkpoints/tinyshakespeare_bytebpe_small"

  num_workers: 0
